<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komikan - Baca Komik Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="logo">
            <i class="fas fa-book-open"></i>
            <h1>Komikan</h1>
        </div>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari komik..." autocomplete="off">
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="theme-btn">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Memuat komik...</p>
        </div>

        <!-- POPULER -->
        <section id="populerSection">
            <h2 class="section-title"><i class="fas fa-fire"></i> Komik Populer</h2>
            <div id="populerList" class="comic-grid"></div>
        </section>

        <!-- TERBARU -->
        <section id="terbaruSection">
            <h2 class="section-title"><i class="fas fa-clock"></i> Komik Terbaru</h2>
            <div id="terbaruList" class="comic-grid"></div>
        </section>

        <!-- REKOMENDASI -->
        <section id="rekomendasiSection">
            <h2 class="section-title"><i class="fas fa-star"></i> Rekomendasi</h2>
            <div id="rekomendasiList" class="comic-grid"></div>
        </section>

        <!-- SEARCH -->
        <section id="searchSection" class="hidden">
            <h2 class="section-title"><i class="fas fa-search"></i> Hasil Pencarian</h2>
            <div id="searchList" class="comic-grid"></div>
        </section>

        <!-- DETAIL -->
        <section id="detailSection" class="hidden">
            <button id="backToHome" class="back-btn">
                <i class="fas fa-arrow-left"></i> Kembali
            </button>
            <div id="mangaDetail"></div>
            
            <!-- SEARCH CHAPTER -->
            <div class="chapter-search-container">
                <div class="chapter-search">
                     <i class="fas fa-search"></i>
                    <input type="text" id="chapterSearchInput" placeholder="Cari chapter (120, 120-130, 150+, <50)..." autocomplete="off">
                </div>
                <div class="chapter-search-hint">
                    <span>💡 Cari: angka spesifik (120) | range (120-130) | keatas (150+) | kebawah (<50)</span>
                </div>
            </div>
            
            <div id="chapterList" class="chapter-list"></div>
        </section>

        <!-- READER -->
        <section id="readerSection" class="hidden">
            <div class="reader-header">
                <button id="backToDetail" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <span id="chapterTitle">Chapter</span>
            </div>
            
            <!-- NAVIGASI CHAPTER - ATAS -->
            <div class="chapter-nav">
                <button id="prevChapterBtn" disabled>
                    <i class="fas fa-chevron-left"></i> Sebelumnya
                </button>
                <span class="chapter-info" id="chapterNavInfo">1 / 1</span>
                <button id="nextChapterBtn" disabled>
                    Selanjutnya <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            
            <!-- GAMBAR -->
            <div id="readerContainer" class="reader-container"></div>
            
            <!-- NAVIGASI CHAPTER - BAWAH -->
            <div class="chapter-nav" style="margin-top:1rem;">
                <button id="prevChapterBtnBottom" disabled>
                    <i class="fas fa-chevron-left"></i> Sebelumnya
                </button>
                <span class="chapter-info" id="chapterNavInfoBottom">1 / 1</span>
                <button id="nextChapterBtnBottom" disabled>
                    Selanjutnya <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2024 Komikan | <a href="https://www.instagram.com/artdrian.py/" target="_blank">Eksan</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
